<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>考前游园会</title>
    <style>
        :root {
            --paper: #f2eada;
            --ink: #2b2b2b;
            --vermilion: #8c2727;
            --jade: #3d5a45;
            --blue: #3c5a82;
        }
        body {
            background-color: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/rice-paper-2.png');
            color: var(--ink);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: "Microsoft YaHei", serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .header {
            position: relative;
            border-bottom: 3px double var(--ink);
            width: 100%;
            padding: 15px;
            text-align: center;
            font-size: 36px;
            letter-spacing: 8px;
            font-weight: bold;
            background: rgba(255,255,255,0.4);
            box-sizing: border-box;
        }

        .settings-container {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 1001; /* 确保在最上层 */
        }

        /* 设置按钮样式 */
        #settings-btn {
            padding: 8px 15px;
            font-size: 16px;
        }

        /* 设置面板 - 初始隐藏 */
        .settings-panel {
            display: none;
            position: absolute;
            top: 45px;
            right: 0;
            background: rgb(235, 225, 225);
            opacity: 0.8;
            border: 2px solid var(--ink);
            padding: 15px;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1);
            min-width: 220px;
            flex-direction: column;
            gap: 12px;
        }

        /* 当激活时显示面板 */
        .settings-panel.active {
            display: flex;
        }

        /* 面板内的音量组 */
        .vol-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        input[type="range"] {
            cursor: pointer;
            width: 100px;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            height: 8px;
            background: #8c2727;
            border-radius: 4px;
            border: 1px solid var(--ink); 
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; 
            height: 18px;
            width: 18px; 
            background: var(--paper);
            border: 2px solid var(--ink);
            border-radius: 50%;       
            margin-top: -6px;   
        }

        input[type="range"]::-moz-range-track {
            height: 8px;
            background: #8c2727;
            border-radius: 4px;
        }

        input[type="range"]::-moz-range-thumb {
            height: 18px;
            width: 18px;
            background: var(--paper);
            border: 2px solid var(--ink);
            border-radius: 50%;
        }

        #main-stage { display: none; gap: 40px; padding: 20px; max-width: 1400px; width: 100%; justify-content: center; }
        .left-section { display: flex; flex-direction: column; align-items: center; }
        
        #global-float-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;  
            z-index: 9999;
        }
        .global-float-text {
            position: absolute;
            font-weight: bold;
            font-size: 50px;
            animation: floatUp 1s forwards;
            white-space: nowrap;
            text-shadow: 0 0 2px white;
        }
        /* 地图样式 */
        #board {
            display: grid;
            grid-template-columns: repeat(5, 120px);
            grid-template-rows: repeat(5, 120px);
            gap: 12px; padding: 15px; border: 2px solid var(--ink); background: rgba(0,0,0,0.02);
        }
        .cell {
            background: rgba(255,255,255,0.8); border: 1px solid var(--ink);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; transition: 0.3s;
        }
        .cell.active { transform: scale(1.1); box-shadow: 0 0 15px var(--vermilion); z-index: 10; outline: 4px solid var(--vermilion); }
        .cell-icon { font-size: 36px; opacity: 0.8; }
        .owner-banner { position: absolute; bottom: 0; width: 100%; color: white; font-size: 12px; padding: 4px 0; text-align: center; font-weight: bold; }

        /* 积分榜与飘字 */
        #score-panel { width: 360px; background: rgba(255,255,255,0.7); border: 2px solid var(--ink); padding: 15px; position: relative; }
        .score-item { margin-bottom: 12px; padding: 12px; border: 1px solid #ccc; background: white; transition: 0.3s; border-left: 8px solid #ccc; position: relative; }
        .score-item.active-player { transform: scale(1.03); box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .float-text { position: absolute; right: 10px; top: 0; font-weight: bold; font-size: 20px; animation: floatUp 1s forwards; pointer-events: none; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-30px); } }

        .inv-tag { display: inline-block; padding: 4px 8px; margin: 3px; background: var(--jade); color: white; font-size: 12px; border-radius: 4px; }

        /* 骰子区域 */
        .dice-area { display: flex; align-items: center; justify-content: center; gap: 30px; margin-top: 20px; background: #fff; padding: 15px; border: 2px solid var(--ink); width: 100%; box-sizing: border-box;}
        #dice { width: 60px; height: 60px; position: relative; transform-style: preserve-3d; transition: transform 1s; cursor: pointer; }
        .dice-face { position: absolute; width: 60px; height: 60px; background: white; border: 2px solid var(--ink); line-height: 60px; text-align: center; font-size: 28px; font-weight: bold; color: var(--vermilion); }
        .front { transform: rotateY(0deg) translateZ(30px); } .back { transform: rotateY(180deg) translateZ(30px); }
        .right { transform: rotateY(90deg) translateZ(30px); } .left { transform: rotateY(-90deg) translateZ(30px); }
        .top { transform: rotateX(90deg) translateZ(30px); } .bottom { transform: rotateX(-90deg) translateZ(30px); }

        /* 弹窗样式 */
        .btn-retro { background: var(--paper); border: 2px solid var(--ink); color: var(--ink); padding: 10px 20px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-retro:hover { background: var(--ink); color: var(--paper); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; border: 3px solid var(--ink); border-radius: 12px; padding: 30px; max-width: 800px; width: 90%; text-align: center; }
        
        .strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        .btn-strategy { padding: 20px; border: 2px solid var(--ink); background: #f9f9f9; cursor: pointer; font-size: 20px; font-weight: bold; transition: 0.2s; }
        .btn-strategy:hover { border-color: var(--vermilion); background: #fffcf5; }
        
        textarea { width: 100%; height: 80px; margin-top: 15px; padding: 10px; font-size: 18px; border: 2px solid var(--ink); font-family: inherit; box-sizing: border-box;}
        .pocket-compare { display: flex; gap: 15px; margin-bottom: 20px; }
        .pocket-box { flex: 1; padding: 15px; border: 2px dashed #ccc; background: #fafafa; text-align: left; }
        
        .share-info { font-size: 14px; color: var(--vermilion); background: #fff5f5; padding: 8px; margin: 10px 0; border: 1px solid #eec0c0; font-weight: bold;}
        #info-close-btn { margin-top: 10px; padding: 8px 30px;}
        
        .summary-col { background: #fdfdfd; padding: 10px; border: 1px solid #eee; min-height: 200px; }
        .summary-item { padding: 5px 8px; margin: 5px 0; border-left: 3px solid #ccc; background: #fff; font-size: 20px; line-height: 1.6; word-break: break-all; }
    </style>
</head>
<body>

<div class="header">
    🎋 考前游园会 🎋
    <div class="settings-container">
    <button id="settings-btn" class="btn-retro" onclick="toggleSettings()">⚙️ 设置</button>
    <div id="settings-panel" class="settings-panel">
        <div class="vol-group">
            <span>🎵音乐：</span>
            <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="updateMusicVol(this.value)">
        </div>
        <div class="vol-group">
            <span>🔊音效：</span>
            <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="updateSfxVol(this.value)">
        </div>
    </div>
</div>
</div>

<div id="setup" style="margin-top: 50px; text-align: center; background: white; padding: 40px; border: 3px solid var(--ink);">
    <h2 style="color:var(--vermilion);">请配置小组数量</h2>
    <input type="number" id="player-num" value="4" min="2" max="6" style="font-size: 24px; width: 80px; text-align: center;">
    <br><br>
    <button class="btn-retro" onclick="initGame()" style="font-size: 20px; padding: 15px 40px;">正式入园</button>
</div>

<div id="main-stage">
    <div class="left-section">
        <div id="board"></div>
        <div class="dice-area">
            <h3 id="dice-status" style="margin:0; font-size:24px;">等待出发...</h3>
            <div id="dice" onclick="rollDice()">
                <div class="dice-face front">1</div><div class="dice-face back">6</div>
                <div class="dice-face right">3</div><div class="dice-face left">4</div>
                <div class="dice-face top">2</div><div class="dice-face bottom">5</div>
            </div>
            <p style="margin:0; color:#666; font-size:14px;">(点击骰子)</p>
        </div>
    </div>
    <div id="score-panel">
        <h3 style="border-bottom: 2px solid var(--ink); text-align: center; margin-top:0; padding-bottom: 10px;">📊 积分与锦囊</h3>
        <div id="player-list"></div>
        <button class="btn-retro" id="end-game-btn" onclick="showFinalResult()" style="width:100%; margin-bottom:15px; background:var(--vermilion); color:white;">🏁 结束游园</button>
    </div>
</div>

<div id="global-float-container"></div>

<div id="synthesis-modal" class="modal">
    <div class="modal-content">
        <h2 id="syn-title" style="color: var(--jade); font-size: 32px; margin-top:0;">⚖️ 录入心得</h2>
        <div id="syn-welcome" style="margin-bottom:10px; font-weight:bold; color:var(--jade); display:none;">🏡 欢迎回到本组领地！请在此更新或巩固经验。</div>
        <div style="font-weight:bold; margin-bottom:15px; color:#666;">当前操作组：<span id="syn-player-name" style="color:var(--ink)"></span></div>
        <p>请选择主题并输入核心心得：</p>
        <div style="display:flex; gap:15px; justify-content:center; margin-top: 10px;">
            <button class="btn-retro theme-opt" onclick="selectTheme('🌿 身心放松', this)">🌿 身心放松</button>
            <button class="btn-retro theme-opt" onclick="selectTheme('📈 高效复习', this)">📈 高效复习</button>
            <button class="btn-retro theme-opt" onclick="selectTheme('🛡️ 考场应对', this)">🛡️ 考场应对</button>
        </div>
        <textarea id="user-input" placeholder="输入关键词；例如：“考前检查文具袋...”（建议输入8字以内）"></textarea>
        <div style="margin-top: 15px; background: #fffcf5; padding: 10px; border: 1px dashed #ccc;">
            <label style="cursor:pointer; font-weight:bold; color:var(--vermilion);"><input type="checkbox" id="syn-priv"> ✨ 表现优异/内容详实 (额外 +1 股)</label>
        </div>
        <div style="margin-top:25px;">
            <button id="syn-confirm-btn" class="btn-retro" style="background:var(--jade); color:white;" onclick="confirmSynthesis()">确认发布</button>
            <button class="btn-retro" onclick="closeAllModals()">跳过/关闭</button>
        </div>
    </div>
</div>

<div id="challenge-modal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--vermilion); font-size: 32px; margin-top:0;">⚔️ 策略交流</h2>
        <div style="font-weight:bold; margin-bottom:15px; color:#666;">挑战组：<span id="chal-player-name"></span> VS 领主组：<span id="owner-player-name"></span></div>
        <div class="pocket-compare">
            <div class="pocket-box" id="challenger-pocket"></div>
            <div style="display:flex; align-items:center; font-weight:900; color:#aaa;">VS</div>
            <div class="pocket-box" id="owner-pocket"></div>
        </div>
        <div id="challenge-info" style="text-align:left; background:#fff; padding:15px; border:2px solid var(--ink); margin-bottom:10px;"></div>
        <div id="share-progress" class="share-info"></div>
        <h3>请选择本次突破策略：</h3>
        <div class="strategy-grid">
            <button class="btn-strategy" onclick="enterShowcase('🔗 经验互融')">🔗 经验互融</button>
            <button class="btn-strategy" onclick="enterShowcase('🎭 考场模拟')">🎭 考场模拟</button>
        </div>
        <button class="btn-retro" onclick="closeAllModals()">关闭挑战</button>
    </div>
</div>

<div id="showcase-modal" class="modal">
    <div class="modal-content" style="border-color: var(--blue); background: #fcfdfd;">
        <h2 id="showcase-title" style="font-size: 48px; color: var(--blue); margin: 10px 0; letter-spacing: 4px;"></h2>
        <div id="showcase-desc" style="font-size: 20px; line-height: 1.6; padding: 25px; background: #fff; border: 2px dashed var(--blue); margin: 20px 0; text-align: left;"></div>
        <div style="background:#fffcf5; padding:15px; border:1px dashed var(--vermilion); margin-bottom:20px;">
            <label style="cursor:pointer; font-weight:bold; color:var(--vermilion); font-size: 18px;">
                <input type="checkbox" id="chal-priv" style="width:20px;height:20px;vertical-align:middle;"> ✨ 全班共识：表现出色 (额外 +1 股)
            </label>
        </div>
        <div style="display:flex; justify-content:center; gap:20px;">
            <button class="btn-retro" style="background:var(--jade); color:white; font-size:20px; padding:15px 40px;" onclick="handleFinalResult(true)">✅ 方案可行 (+1股)</button>
            <button class="btn-retro" style="background:var(--vermilion); color:white; font-size:20px; padding:15px 40px;" onclick="handleFinalResult(false)">❌ 仍需磨炼 (结束)</button>
            <button class="btn-retro" style="background:#918b8b; color:white; font-size:20px; padding:15px 40px;" onclick="backToChallenge()" style="background:#eee;">🔙 返回</button>
        </div>
    </div>
</div>

<div id="info-modal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <h2 id="info-title" style="color: var(--vermilion);">📢 提示</h2>
        <p id="info-message" style="font-size: 18px; margin: 20px 0;"></p>
        <button id="info-close-btn" class="btn-retro" style="background: var(--jade); color: white;">确定</button>
    </div>
</div>

<div id="result-screen" class="modal" style="flex-direction: column; overflow-y: auto; padding: 20px 0;">
    <div class="modal-content" style="max-width: 900px; width: 95%; position: relative;">
        <h1 id="winner-title" style="font-size: 40px; margin: 10px 0;"></h1>
        <div id="winner-announcement" style="font-size: 24px; font-weight: bold; margin-bottom: 30px;"></div>
        
        <div id="summary-cols" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: left; margin-top: 20px;">
            <div class="summary-col">
                <h3 style="color:var(--jade); border-bottom:2px solid var(--jade);">🌿 身心放松</h3>
                <div id="col-relax" style="font-size: 20px;"></div>
            </div>
            <div class="summary-col">
                <h3 style="color:var(--blue); border-bottom:2px solid var(--blue);">📈 高效复习</h3>
                <div id="col-study" style="font-size: 20px;"></div>
            </div>
            <div class="summary-col">
                <h3 style="color:var(--vermilion); border-bottom:2px solid var(--vermilion);">🛡️ 考场应对</h3>
                <div id="col-exam" style="font-size: 20px;"></div>
            </div>
        </div>

        <button class="btn-retro" onclick="location.reload()" style="margin-top: 40px; padding: 15px 50px; font-size: 20px;">🔄 重新开始</button>
    </div>
</div>

<div id="praise-modal" class="modal">
    <div class="modal-content" style="border-color: #e492a1; background: #fffafb;">
        <h2 style="color: #b52c46; font-size: 36px; margin-top:0;">🌸 夸夸奇遇 🌸</h2>
        <div style="font-weight:bold; margin-bottom:15px; color:#666;">当前组：<span id="praise-player-name" style="color:var(--ink); font-size:20px;"></span></div>
        
        <p style="font-size: 20px; line-height: 1.6; color: #555; padding: 10px 20px;">
            请大声说出备考期间，其他小组或同学身上让你敬佩、值得学习的闪光点！<br>
            <span style="font-size: 16px; color: #e18899;">（可以夸奖他们的高效方法、良好心态、或是一次热心的帮助）</span>
        </p>
        
        <div style="margin: 20px 0; padding: 20px; background: white; border: 2px dashed #ff8fa3;">
            <h3 style="margin-top:0; color:#d0445d;">🎯 邀请被夸奖的小组打分：</h3>
            <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
                <button class="btn-retro" style="background:#ffe1e8; color:#e492a1;" onclick="awardPraiseScore(1)">🥉 1分 (略显羞涩，但很开心)</button>
                <button class="btn-retro" style="background:#ffb3c6; color:#a20021;" onclick="awardPraiseScore(2)">🥈 2分 (说到心坎里了！)</button>
                <button class="btn-retro" style="background:#d0445d; color:white;" onclick="awardPraiseScore(3)">🥇 3分 (眼光也太好了吧！)</button>
            </div>
        </div>
        
        <button class="btn-retro" onclick="closeAllModals(); nextTurn();" style="color: #999;">放弃机会 (跳过)</button>
    </div>
</div>

<script>
    let isMusicOn = true, isSfxOn = true;
    let musicVol = 0.5; 
    let sfxVol = 0.5;

    const bgMusic = new Audio('../Audio/bg.mp3'); 
    bgMusic.loop = true;
    bgMusic.volume = musicVol;

    const sfx = { 
        dice: new Audio('../Audio/dice.mp3'), 
        scoreup: new Audio('../Audio/scoreup.mp3'), 
        exchange: new Audio('../Audio/exchange.mp3'),
        click: new Audio('../Audio/click.mp3'),
        pay: new Audio('../Audio/pay.mp3')
    };

    function updateMusicVol(v) {
        musicVol = parseFloat(v);
        bgMusic.volume = musicVol;
        if (musicVol > 0 && bgMusic.paused) {
            bgMusic.play().catch(() => {
                console.log("等待用户交互以播放音乐");
            });
        } else if (musicVol === 0) {
            bgMusic.pause();
        }
    }

    function updateSfxVol(v) {
        sfxVol = parseFloat(v);
    }

    function playSfx(n) { 
        if(sfx[n]) { 
            sfx[n].currentTime = 0; 
            sfx[n].volume = sfxVol; 
            sfx[n].play().catch(()=>{}); 
        } 
    }
    
    const mapOrder = [0,1,2,3,4, 9,14,19,24, 23,22,21,20, 15,10,5];
    let players = [], activePlayerIndex = 0, currentPos = 0, landShares = {};
    let selectedTheme = "", selectedStrategy = "";

    const typeColors = { '🌿 身心放松': '#3d5a45', '📈 高效复习': '#3c5a82', '🛡️ 考场应对': '#8c2727' };
    const strategyTips = {
        '🔗 经验互融': '【展示任务】请挑战者结合双组已有的锦囊，构建一个新的更强方案！',
        '🎭 考场模拟': '【展示任务】设定一个突发危机情景，使用领主的锦囊思想，演示如何化解危机。'
    };

    function initGame() {
        const num = document.getElementById('player-num').value;
        const colors = [{m:'#8c2727',l:'#fdecec'}, {m:'#3d5a45',l:'#ecfdf1'}, {m:'#3c5a82',l:'#ecf5fd'}, {m:'#b58235',l:'#fdf9ec'}, {m:'#6b4226',l:'#fdf5ec'}, {m:'#4b0082',l:'#f7ecfd'}];
        for(let i=0; i<num; i++) players.push({ id:i, name:`第${i+1}组`, color:colors[i], score:0, inventory:[] });
        document.getElementById('setup').style.display='none';
        document.getElementById('main-stage').style.display='flex';
        renderBoard(); updateUI();
    }

    function rollDice() {
        if(document.getElementById('dice').classList.contains('rolling')) return;
        playSfx('dice');
        const num = Math.floor(Math.random()*6)+1;
        const dice = document.getElementById('dice');
        const rotations = [[0,0], [-90,0], [0,-90], [0,90], [90,0], [0,180]];
        const r = rotations[num-1];
        dice.style.transform = `rotateX(${r[0]+720}deg) rotateY(${r[1]+720}deg)`;
        setTimeout(() => {
            currentPos = (mapOrder.indexOf(mapOrder[currentPos]) + num) % 16;
            renderBoard(); handleTileEvent();
        }, 1000);
    }

    function handleTileEvent() {
        closeAllModals();
        const p = players[activePlayerIndex];
        const tileIdx = mapOrder[currentPos];
        if(currentPos === 0) {
            const p = players[activePlayerIndex];
            p.score += 1;
            showFloatingText(activePlayerIndex, "+1", p.color.m);
            updateUI();
            showInfoModal('🚩 回到起点', `${p.name} 回到起点，并获得了一分！`, function() {
            nextTurn(); });
            return;
        }

        if(currentPos === 8) {
            document.getElementById('praise-player-name').innerText = p.name;
            document.getElementById('praise-modal').style.display = 'flex';
            playSfx('exchange');
            return; 
        }

        if(landShares[currentPos]) {
            const land = landShares[currentPos];
            if(land.ownerId === p.id) {
                showInfoModal('🏡 回到领地', `你回到了自己的领地。通过更新心得来巩固自己的领地吧！`, function() {
                    openSynthesis(true);
                });
            } else {
                    const owner = players[land.ownerId];
                    showInfoModal('⚠️ 路过他人领地', `你走到了 ${owner.name} 的领地，将被扣除 1 分，并给对方增加 1 分。`, function() {
                    p.score = Math.max(0, p.score - 1); 
                    owner.score += 1; 
                    showFloatingText(activePlayerIndex, "-1", p.color.m);
                    showFloatingText(land.ownerId, "+1", owner.color.m);
                    updateUI(); 
                    playSfx('pay');
                    setTimeout(openChallenge, 800);
                });
            }
        } else {
            openSynthesis(false);
        }
    }

    function openSynthesis(isOwnLand) {
        selectedTheme = ""; document.getElementById('user-input').value = "";
        document.getElementById('syn-priv').checked = false;
        document.getElementById('syn-player-name').innerText = players[activePlayerIndex].name;
        document.getElementById('syn-title').innerText = isOwnLand ? "🏡 巩固领地" : "⚖️ 录入心得";
        document.getElementById('syn-welcome').style.display = isOwnLand ? "block" : "none";
        document.getElementById('syn-confirm-btn').innerText = isOwnLand ? "确认更新" : "确认发布";
        
        document.querySelectorAll('.theme-opt').forEach(b => {
            b.style.background='var(--paper)';
            b.style.color='var(--ink)';
        });
        document.getElementById('synthesis-modal').style.display='flex';
    }

    function selectTheme(t, btn) {
        selectedTheme = t;
        document.querySelectorAll('.theme-opt').forEach(b => {
            b.style.background='var(--paper)';
            b.style.color='var(--ink)';
        });
        btn.style.background = 'var(--jade)'; 
        btn.style.color='white';
    }

    function confirmSynthesis() {
        const text = document.getElementById('user-input').value;
        if(!selectedTheme || !text) return alert("请完成主题选择和心得输入！");
        const p = players[activePlayerIndex];
        const extra = document.getElementById('syn-priv').checked ? 1 : 0;
        
        if(landShares[currentPos]) {
            const land = landShares[currentPos];
            land.shares[p.id] += (1 + extra);
            land.theme = selectedTheme;
            land.content = text;
        } else {
            landShares[currentPos] = { ownerId:p.id, theme:selectedTheme, content:text, shares:{[p.id]:1+extra} };
            p.score += 1;
            showFloatingText(activePlayerIndex, "+1", p.color.m);
        }
        p.inventory.push({ type:selectedTheme, text:text });
        playSfx('scoreup');
        closeAllModals(); renderBoard(); nextTurn();
    }

    function openChallenge() {
        const land = landShares[currentPos], owner = players[land.ownerId], challenger = players[activePlayerIndex];
        document.getElementById('chal-player-name').innerText = challenger.name;
        document.getElementById('owner-player-name').innerText = owner.name;
        renderPocket('challenger-pocket', challenger, "🚀 挑战组锦囊");
        renderPocket('owner-pocket', owner, "🏰 领主组锦囊");
        
        const myShares = land.shares[challenger.id] || 0;
        const ownerShares = land.shares[owner.id];
        const diff = ownerShares - myShares + 1;

        document.getElementById('challenge-info').innerHTML = `
            <div style="margin-bottom:5px;">📍 领地议题：<strong>${land.theme}</strong></div>
            <div style="padding:10px; background:${owner.color.l}; border-left:5px solid ${owner.color.m}; font-weight:bold;">"${land.content}"</div>
        `;
        document.getElementById('share-progress').innerHTML = `你的股份：${myShares} 股 | 领主股份：${ownerShares} 股 <br> 💡 还需要 ${diff} 股即可夺取该领地！`;
        document.getElementById('challenge-modal').style.display='flex';
    }

    function enterShowcase(strat) {
        selectedStrategy = strat;
        document.getElementById('showcase-title').innerText = strat;
        document.getElementById('showcase-desc').innerHTML = strategyTips[strat];
        document.getElementById('challenge-modal').style.display='none';
        document.getElementById('showcase-modal').style.display='flex';
    }

    function handleFinalResult(isSuccess) {
        const p = players[activePlayerIndex];
        const land = landShares[currentPos]; 
        const extra = document.getElementById('chal-priv').checked ? 1 : 0;
        if (isSuccess) {
            land.shares[p.id] = (land.shares[p.id] || 0) + 1 + extra;
            
            if (land.shares[p.id] > land.shares[land.ownerId]) {
                const oldOwner = players[land.ownerId];
                land.ownerId = p.id; 
                playSfx('exchange');
                
                closeAllModals(); 
                
                setTimeout(() => {
                    showInfoModal('🏆 领地易主', `${p.name} 成功夺取了“${oldOwner.name}”的领地！`, function() {
                        renderBoard(); 
                        nextTurn();
                    });
                }, 100);
                return; 
            } else {
                playSfx('scoreup');
            }
        }
      
        closeAllModals(); 
        renderBoard(); 
        nextTurn();
    }

    function backToChallenge() {
        document.getElementById('showcase-modal').style.display = 'none';
        document.getElementById('challenge-modal').style.display = 'flex';
        selectedStrategy = ""; 
    }

    function showFloatingText(playerIdx, text, color) {
        const scoreItems = document.querySelectorAll('.score-item');
        if (!scoreItems[playerIdx]) return;
        const targetEl = scoreItems[playerIdx];
        const rect = targetEl.getBoundingClientRect(); 

        const container = document.getElementById('global-float-container');
        const float = document.createElement('div');
        float.className = 'global-float-text';
        float.innerText = text;
        float.style.color = color;
        float.style.left = (rect.right + 10) + 'px';
        float.style.top = (rect.top + rect.height / 2 - 10) + 'px';
        container.appendChild(float);

        setTimeout(() => float.remove(), 1500); 
    }

    function getTagsHtml(player) {
        return player.inventory.map(inv => `<span class="inv-tag" style="background:${typeColors[inv.type] || player.color.m}">${inv.text.substring(0,8)}</span>`).join('') || '<span style="color:#aaa; font-size:12px;">暂无</span>';
    }

    function renderPocket(id, p, title) {
        document.getElementById(id).innerHTML = `<div style="font-weight:bold; color:${p.color.m}; border-bottom:1px solid #eee; margin-bottom:8px;">${title}</div>` + getTagsHtml(p);
    }

    function renderBoard() {
        const board = document.getElementById('board'); board.innerHTML = '';
        const realCurrentPos = mapOrder[currentPos];
        for(let i=0; i<25; i++) {
            const cell = document.createElement('div'); cell.className = 'cell';
            if(mapOrder.includes(i)) {
                if(i === realCurrentPos) cell.classList.add('active');
                if(i === 0) {
                    cell.innerHTML = '🚩<br>起点';
                } else {
                    const logicIdx = mapOrder.indexOf(i);

                    if(logicIdx === 8) {
                        cell.style.background = '#fff0f3';
                        cell.style.border = '3px dashed #d0445d';
                        cell.innerHTML = '<span style="font-size:28px">🌸</span><br><b style="color:#d0445d; font-size:14px;">夸夸奇遇</b>';
                    } else {
                        const land = landShares[logicIdx];
                        if(land) {
                            const owner = players[land.ownerId];
                            cell.style.background = owner.color.l; cell.style.border = `3px solid ${owner.color.m}`;
                            cell.innerHTML = `🏰<div class="owner-banner" style="background:${owner.color.m}">${owner.name} (${land.shares[owner.id]}股)</div>`;
                        } else cell.innerHTML = '<span style="opacity:0.2">⚖️</span>';
                    }
                }
            } else cell.style.visibility = 'hidden';
            board.appendChild(cell);
        }
    }

    function updateUI() {
        const list = document.getElementById('player-list'), cur = players[activePlayerIndex];
        list.innerHTML = '';
        players.forEach((p, i) => {
            const isActive = i === activePlayerIndex;
            list.innerHTML += `
                <div class="score-item ${isActive?'active-player':''}" style="border-left-color:${p.color.m}">
                    <div style="display:flex; justify-content:space-between; font-weight:bold;">
                        <span style="color:${p.color.m}">${p.name}</span><span>${p.score} 分</span>
                    </div>
                    <div style="margin-top:8px;">${getTagsHtml(p)}</div>
                </div>`;
        });
        document.body.style.backgroundColor = cur.color.l;
        document.getElementById('dice-status').innerHTML = `当前组：<b style="color:${cur.color.m}">${cur.name}</b>`;
    }

    function nextTurn() { activePlayerIndex = (activePlayerIndex + 1) % players.length; updateUI(); }
    function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    function showInfoModal(title, message, onClose) {
        const modal = document.getElementById('info-modal');
        const titleEl = document.getElementById('info-title');
        const msgEl = document.getElementById('info-message');
        const closeBtn = document.getElementById('info-close-btn');
        
        titleEl.innerText = title || '📢 提示';
        msgEl.innerText = message;
        
        const newCloseBtn = closeBtn.cloneNode(true);
        closeBtn.parentNode.replaceChild(newCloseBtn, closeBtn);
        
        newCloseBtn.addEventListener('click', function() {
            modal.style.display = 'none';
            if (onClose && typeof onClose === 'function') onClose();
        });
        
        modal.style.display = 'flex';
    }

    function showFinalResult() {
        
        const sortedPlayers = [...players].sort((a, b) => b.score - a.score);
        const winner = sortedPlayers[0];

        const winnerTitle = document.getElementById('winner-title');
        const winnerAnnounce = document.getElementById('winner-announcement');
        winnerTitle.innerText = `🏆 ${winner.name} 获胜！`;
        winnerTitle.style.color = winner.color.m;
        winnerAnnounce.innerText = `最终积分为：${winner.score} 分`;

        const resScreen = document.getElementById('result-screen');
        resScreen.style.backgroundColor = winner.color.l;
        resScreen.style.display = 'flex';

        const allTips = { '🌿 身心放松': [], '📈 高效复习': [], '🛡️ 考场应对': [] };
        
        players.forEach(p => {
            p.inventory.forEach(item => {
                if (allTips[item.type] && !allTips[item.type].includes(item.text)) {
                    allTips[item.type].push(item.text);
                }
            });
        });

        renderTipColumn('col-relax', allTips['🌿 身心放松'], 'var(--jade)');
        renderTipColumn('col-study', allTips['📈 高效复习'], 'var(--blue)');
        renderTipColumn('col-exam', allTips['🛡️ 考场应对'], 'var(--vermilion)');
    }

    function renderTipColumn(elementId, tips, color) {
        const container = document.getElementById(elementId);
        container.innerHTML = tips.length > 0 
            ? tips.map(t => `<div class="summary-item" style="border-left-color:${color}">${t}</div>`).join('')
            : '<div style="color:#ccc;">（暂无心得）</div>';
    }

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.classList.toggle('active');
        
        if (panel.classList.contains('active')) {
            setTimeout(() => {
                window.addEventListener('click', closePanelOnClickOutside);
            }, 10);
        }
    }

    function closePanelOnClickOutside(event) {
        const container = document.querySelector('.settings-container');
        const panel = document.getElementById('settings-panel');
        if (!container.contains(event.target)) {
            panel.classList.remove('active');
            window.removeEventListener('click', closePanelOnClickOutside);
        }
    }

    function awardPraiseScore(points) {
        const p = players[activePlayerIndex];
        p.score += points;
        
        showFloatingText(activePlayerIndex, "+" + points, p.color.m);
        playSfx('scoreup');
        
        closeAllModals();
        renderBoard();
        updateUI(); 
        nextTurn();
    }
</script>
</body>
</html>
